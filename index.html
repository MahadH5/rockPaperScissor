<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="game-container">
    <h1>🎮 Rock Paper Scissors</h1>

    <p id="turn">Press Start to Play</p>

    <div class="controls">
      <button id="start-btn">Start Game</button>
      <button id="restart-btn">Restart</button>
    </div>

    <div class="buttons">
      <button class="choice-btn" data-choice="Rock" disabled>
        🪨 Rock
      </button>

      <button class="choice-btn" data-choice="Paper" disabled>
        📄 Paper
      </button>

      <button class="choice-btn" data-choice="Scissors" disabled>
        ✂️ Scissors
      </button>
    </div>

    <div class="results">
      <p><strong>You:</strong> <span id="player-choice">-</span></p>
      <p><strong>Computer:</strong> <span id="computer-choice">-</span></p>

      <h2 id="result">Make your move!</h2>
    </div>

    <div class="scoreboard">
      <h3>🏆 Scoreboard</h3>

      <div class="score-row">
        <div>
          <h4>Player</h4>
          <span id="player-score">0</span>
        </div>

        <div>
          <h4>Computer</h4>
          <span id="computer-score">0</span>
        </div>
      </div>

      <p class="goal">First to 5 wins the game!</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
