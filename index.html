<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Arcade Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

  <h1>🎮 ROCK PAPER SCISSORS</h1>

  <p id="turn">Press Start to Play</p>

  <div class="controls">
    <button id="start-btn">▶ START</button>
    <button id="restart-btn">🔄 RESTART</button>
  </div>

  <div class="buttons">

    <button class="choice-btn" data-choice="Rock" disabled>
      🪨 Rock
    </button>

    <button class="choice-btn" data-choice="Paper" disabled>
      📄 Paper
    </button>

    <button class="choice-btn" data-choice="Scissors" disabled>
      ✂️ Scissors
    </button>

  </div>

  <div class="results">

    <div class="choices-display">
      <div>
        <h3>You</h3>
        <p id="player-choice">-</p>
      </div>

      <div>
        <h3>Computer</h3>
        <p id="computer-choice">-</p>
      </div>
    </div>

    <h2 id="result">Make your move!</h2>

  </div>

  <div class="scoreboard">

    <h3>🏆 SCOREBOARD</h3>

    <div class="score-row">

      <div class="score-card">
        <span>Player</span>
        <h2 id="player-score">0</h2>
      </div>

      <div class="score-card">
        <span>Computer</span>
        <h2 id="computer-score">0</h2>
      </div>

    </div>

    <p class="goal">First to 5 wins!</p>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
